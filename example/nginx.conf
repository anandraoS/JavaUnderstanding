# Nginx Configuration for Angular Application with Backend API Proxy
# This configuration demonstrates how frontend communicates with backend

events {
    worker_connections 1024;
}

http {
    # MIME types for serving correct content
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compression for faster delivery
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml;

    # Upstream backend definition
    # This references the Spring Boot container by service name "backend"
    # Docker will resolve "backend" to the container's IP address
    upstream api_backend {
        server backend:8080;  # Service name: backend, port: 8080
    }

    # Upstream for multiple backend instances (optional load balancing)
    # upstream api_backend {
    #     server backend1:8080;
    #     server backend2:8080;
    #     server backend3:8080;
    # }

    server {
        # Listen on port 80 (HTTP)
        listen 80;
        listen [::]:80;  # IPv6 support

        server_name _;

        # Root directory where Angular files are served from
        root /usr/share/nginx/html;
        index index.html;

        # ============= STATIC FILES CACHING =============
        # Cache static assets for long time (1 year)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        # ============= API PROXY RULES =============
        # All requests to /api/* are proxied to Spring Boot backend
        location /api/ {
            # Proxy pass to backend container
            proxy_pass http://api_backend;

            # Set proper headers for proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header Connection "";

            # Timeouts for backend communication
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering configuration
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Handle redirects from backend
            proxy_redirect off;
        }

        # ============= ANGULAR SPA ROUTING =============
        # Important: SPA routing - all non-matching requests go to index.html
        # This allows Angular Router to handle all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============= ERROR PAGES =============
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;

        # ============= SECURITY HEADERS =============
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Optional: Redirect HTTP to HTTPS (uncomment if using SSL)
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # ... rest of configuration
    # }
}

