# Config Server Configuration
# Demonstrates: Centralized configuration management

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        # Using native (filesystem) profile for this demo
        # In production, use Git repository
        native:
          search-locations: classpath:/config
        # For Git backend (commented for now):
        # git:
        #   uri: https://github.com/your-org/config-repo
        #   default-label: main
        #   clone-on-start: true
  profiles:
    active: native

server:
  port: 8888

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
