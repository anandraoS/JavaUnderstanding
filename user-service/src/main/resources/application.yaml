# ═══════════════════════════════════════════════════════════════════════════════
# User Service Configuration — ALL INFRASTRUCTURE ENABLED
# ═══════════════════════════════════════════════════════════════════════════════
# Prerequisites (installed via brew on Mac):
#   brew services start postgresql
#   brew services start mysql
#   brew services start redis
#   brew services start kafka       (also starts zookeeper)
#   brew services start rabbitmq    (used by order-service)
#   Run Zipkin: java -jar zipkin.jar OR brew install zipkin && zipkin
#
# Create databases before first run:
#   psql -U postgres -c "CREATE DATABASE userdb;"
#   mysql -u root -e "CREATE DATABASE IF NOT EXISTS user_audit_db;"
# ═══════════════════════════════════════════════════════════════════════════════

spring:
  main:
    web-application-type: servlet   # Force MVC mode (both web+webflux on classpath)
  application:
    name: user-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 5
        initial-interval: 1000

  # ─── PRIMARY DATABASE: PostgreSQL (stores users) ─────────────────────────────
  datasource:
    primary:
      url: jdbc:postgresql://localhost:5432/userdb
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
    # ─── SECONDARY DATABASE: MySQL (stores audit logs) ─────────────────────────
    secondary:
      url: jdbc:mysql://localhost:3306/user_audit_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: root
      password:
      driver-class-name: com.mysql.cj.jdbc.Driver

  # ─── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update         # Create/update tables automatically
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ─── KAFKA: Event streaming ─────────────────────────────────────────────────
  # Publishes USER_CREATED/UPDATED/DELETED events for order-service to consume
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: user-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ─── REDIS: Distributed caching ─────────────────────────────────────────────
  # Caches user lookups. See @Cacheable in UserService.java
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

server:
  port: 8081

# ─── Eureka Client: Service Discovery ─────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

# ─── Custom App Properties ────────────────────────────────────────────────────
app:
  jwt:
    secret: MySecretKeyForJWTTokenGenerationMustBeLongEnoughFor512BitHS512AlgorithmRequirement
    expiration: 18000000    # 5 hours in milliseconds
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100

# ─── Actuator: Monitoring endpoints ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: always
  # ─── Zipkin: Distributed tracing ──────────────────────────────────────────
  tracing:
    sampling:
      probability: 1.0           # Trace 100% of requests
  zipkin:
    tracing:
      enabled: true
      endpoint: http://localhost:9411/api/v2/spans

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.learning: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.kafka: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
