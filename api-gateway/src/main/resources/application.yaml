# API Gateway Configuration
# This file bootstraps the gateway, detailed config comes from Config Server

spring:
  main:
    web-application-type: reactive   # API Gateway is always WebFlux/reactive
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 5
        initial-interval: 1000

server:
  port: 8080

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.learning: DEBUG
