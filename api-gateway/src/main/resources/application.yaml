# ═══════════════════════════════════════════════════════════════════════════════
# API Gateway Configuration — ALL INFRASTRUCTURE ENABLED
# ═══════════════════════════════════════════════════════════════════════════════

spring:
  main:
    web-application-type: reactive   # Gateway is always WebFlux/Netty
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 5
        initial-interval: 1000
    # Routes are defined in GatewayConfig.java (Java DSL with JWT filter)
    # gateway:
    #   routes: configured via RouteLocatorBuilder in GatewayConfig.java

  # ─── REDIS: Rate limiting ───────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

# ─── Eureka Client ────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.learning: DEBUG
    org.springframework.security: DEBUG
